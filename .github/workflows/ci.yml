name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: lint + type-check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: openwebui_zi_rag_requirements.txt

      - name: Install system OCR deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-rus libreoffice

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r openwebui_zi_rag_requirements.txt
          pip install ruff mypy httpx

      - name: Ruff
        run: ruff check openwebui_zi_rag/ openwebui_functions/ tools/ tests/

      - name: Mypy --strict
        run: mypy openwebui_zi_rag/ --strict

      - name: Pytest
        run: pytest tests/test_openwebui_zi_rag.py --no-header -x

      - name: Build bundle (sanity)
        run: |
          python3 tools/build_bundle.py --output dist/openwebui_zi_rag_bundle.zip
          test -s dist/openwebui_zi_rag_bundle.zip
